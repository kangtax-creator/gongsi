<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>부동산 공시가격 연혁 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-[#f3f4f6] font-sans min-h-screen">

    <div class="bg-[#0f172a] text-white pt-12 pb-24 px-4">
        <div class="max-w-4xl mx-auto">
            <p class="text-indigo-400 font-bold text-sm mb-2 tracking-wider">세무/부동산 데이터 리서치</p>
            <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight mb-4">부동산 공시가격 연혁 대시보드</h1>
            <p class="text-slate-400 text-sm md:text-base">
                단위: 기준시가는 원(₩) · 출처: 국토교통부(VWORLD) · 생성: 자동 갱신
            </p>
            
            <div class="mt-8 border border-slate-700 bg-slate-800/50 rounded-xl p-4 flex justify-between items-center max-w-md">
                <div>
                    <p class="text-xs text-slate-400 mb-1">Created for</p>
                    <p class="text-emerald-400 font-bold text-lg">KangTax Office</p>
                </div>
                <div class="text-slate-600 text-2xl font-bold">🏢</div>
            </div>
        </div>
    </div>

    <div class="max-w-4xl mx-auto px-4 -mt-12 pb-12 space-y-6">
        
        <div class="bg-white p-6 md:p-8 rounded-2xl shadow-md border border-slate-200">
            <h2 class="text-lg font-extrabold text-slate-800 mb-6">조회 대상 설정</h2>
            
            <div class="space-y-6">
                <div>
                    <div class="flex flex-wrap gap-3">
                        <label class="cursor-pointer">
                            <input type="radio" name="propType" value="공동주택" checked class="peer sr-only">
                            <div class="px-4 py-2 rounded-lg border border-slate-200 text-slate-600 font-medium peer-checked:bg-indigo-50 peer-checked:border-indigo-600 peer-checked:text-indigo-700 transition-all text-sm">공동주택 (아파트/빌라)</div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="propType" value="단독주택" class="peer sr-only">
                            <div class="px-4 py-2 rounded-lg border border-slate-200 text-slate-600 font-medium peer-checked:bg-indigo-50 peer-checked:border-indigo-600 peer-checked:text-indigo-700 transition-all text-sm">단독/개별주택</div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="propType" value="토지" class="peer sr-only">
                            <div class="px-4 py-2 rounded-lg border border-slate-200 text-slate-600 font-medium peer-checked:bg-indigo-50 peer-checked:border-indigo-600 peer-checked:text-indigo-700 transition-all text-sm">개별공시지가 (토지)</div>
                        </label>
                    </div>
                </div>

                <div class="flex space-x-2">
                    <input type="text" id="address" readonly placeholder="주소 검색 버튼을 클릭하세요" class="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500 transition-colors">
                    <button onclick="execDaumPostcode()" class="bg-slate-800 hover:bg-slate-700 text-white px-5 py-3 rounded-xl text-sm font-medium transition-colors whitespace-nowrap">주소 검색</button>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <input type="text" id="dong" placeholder="동 (선택) ex: 101" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500">
                    </div>
                    <div>
                        <input type="text" id="ho" placeholder="호 (선택) ex: 502" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500">
                    </div>
                </div>

                <button onclick="searchPriceHistory()" id="searchBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-indigo-200 transition-all mt-2">
                    연도별 공시가격 조회하기
                </button>
            </div>
        </div>

        <div id="result-container" class="hidden space-y-6">
            
            <div class="bg-white p-6 rounded-2xl shadow-md border border-slate-200">
                <h2 class="text-lg font-extrabold text-slate-800 mb-4">기준시가 변동 추이</h2>
                <div class="relative h-64 w-full">
                    <canvas id="priceChart"></canvas>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-md border border-slate-200">
                <h2 class="text-lg font-extrabold text-slate-800 mb-4">연도별 상세 데이터</h2>
                
                <div id="tag-container" class="flex flex-wrap gap-3">
                    </div>
            </div>

        </div>
    </div>

    <script>
        // 🚨 주의: 아래 따옴표 안에 VWORLD 개발자 센터에서 '깃허브 전용'으로 발급받으신 API 키를 꼭 넣어주세요!
        const VWORLD_KEY = "75321A8E-275D-32A6-82AC-B9D0D8E551FE";
        const DOMAIN = window.location.origin; 
        
        let priceChartInstance = null;

        function execDaumPostcode() {
            new daum.Postcode({
                oncomplete: function(data) {
                    document.getElementById('address').value = data.roadAddress || data.jibunAddress;
                }
            }).open();
        }

        function extractNum(text) {
            if (!text) return "";
            const nums = String(text).match(/\d+/g);
            return nums ? nums.join("") : String(text).trim();
        }

        function fetchJSONP(url) {
            return new Promise((resolve, reject) => {
                const callbackName = 'vworld_cb_' + Math.round(100000 * Math.random());
                const script = document.createElement('script');
                window[callbackName] = function(data) {
                    delete window[callbackName];
                    document.body.removeChild(script);
                    resolve(data);
                };
                const char = url.indexOf('?') > -1 ? '&' : '?';
                script.src = url + char + 'callback=' + callbackName;
                script.onerror = () => {
                    delete window[callbackName];
                    document.body.removeChild(script);
                    reject(new Error('서버 응답 지연'));
                };
                document.body.appendChild(script);
            });
        }

        async function getPnu(address) {
            const categories = ["parcel", "road"]; 
            for (let category of categories) {
                const url = `https://api.vworld.kr/req/search?service=search&request=search&version=2.0&query=${encodeURIComponent(address)}&type=address&category=${category}&format=json&key=${VWORLD_KEY}&domain=${DOMAIN}`;
                try {
                    const data = await fetchJSONP(url);
                    if (data.response && data.response.status === 'OK' && data.response.result.items.length > 0) {
                        return data.response.result.items[0].id; 
                    }
                } catch (error) {
                    console.error(`PNU 조회 실패:`, error);
                }
            }
            return null;
        }

        async function searchPriceHistory() {
            const address = document.getElementById('address').value;
            const propType = document.querySelector('input[name="propType"]:checked').value;
            const dong = extractNum(document.getElementById('dong').value);
            const ho = extractNum(document.getElementById('ho').value);
            const btn = document.getElementById('searchBtn');

            if (!address) {
                alert("대상 주소를 입력해주세요.");
                return;
            }

            btn.innerText = "데이터 수집 및 분석 중...";
            btn.disabled = true;
            btn.classList.add('opacity-70');
            document.getElementById('result-container').classList.add('hidden');

            try {
                const pnu = await getPnu(address);
                if (!pnu) {
                    throw new Error(`'${address}' 주소를 인식할 수 없습니다.`);
                }

                let apiUrl = "";
                let priceField = "";

                if (propType === "공동주택") {
                    apiUrl = "https://api.vworld.kr/ned/data/getApartHousingPriceAttr";
                    priceField = "pblntfPc";
                } else if (propType === "단독주택") {
                    apiUrl = "https://api.vworld.kr/ned/data/getIndvdHousingPriceAttr";
                    priceField = "pblntfPc";
                } else {
                    apiUrl = "https://api.vworld.kr/ned/data/getIndvdLandPriceAttr";
                    priceField = "pblntfPclnd";
                }

                const historyData = [];
                let pageNo = 1;
                let keepFetching = true;

                while (keepFetching) {
                    const params = new URLSearchParams({
                        key: VWORLD_KEY, pnu: pnu, format: "json",
                        numOfRows: "1000", pageNo: String(pageNo), domain: DOMAIN
                    });

                    const data = await fetchJSONP(`${apiUrl}?${params.toString()}`);

                    let items = [];
                    for (const key in data) {
                        if (data[key] && data[key].field) {
                            items = Array.isArray(data[key].field) ? data[key].field : [data[key].field];
                            break;
                        }
                    }

                    if (items.length === 0) break;

                    for (const item of items) {
                        if (propType === "공동주택") {
                            const itemDong = extractNum(item.dongNm);
                            const itemHo = extractNum(item.hoNm);
                            if ((dong && itemDong !== dong) || (ho && itemHo !== ho)) continue;
                        }

                        const priceVal = item[priceField] || item.housePc || item.prc || 0;
                        const yearVal = item.stdrYear || item.pblntfYear;

                        if (priceVal && yearVal) {
                            const row = {
                                year: `${yearVal}년`,
                                price: parseInt(priceVal)
                            };
                            if (propType === "공동주택") {
                                row.area = item.prvuseAr || item.totArea || "N/A";
                            } else if (propType === "단독주택") {
                                row.landArea = item.ladRegstrAr || item.totPlotAr || item.plotAr || "N/A";
                                row.bldArea = item.buldAllTotAr || item.totFlrAr || "N/A";
                            }
                            historyData.push(row);
                        }
                    }

                    if (items.length < 1000) keepFetching = false;
                    pageNo++;
                }

                if (historyData.length > 0) {
                    const uniqueData = [];
                    const seen = new Set();
                    historyData.forEach(row => {
                        const key = `${row.year}_${row.price}`;
                        if (!seen.has(key)) {
                            seen.add(key);
                            uniqueData.push(row);
                        }
                    });

                    uniqueData.sort((a, b) => parseInt(b.year) - parseInt(a.year));
                    
                    renderChart(uniqueData);
                    renderTags(propType, uniqueData); // 🌟 테이블 대신 태그 렌더링 호출
                    document.getElementById('result-container').classList.remove('hidden');
                } else {
                    throw new Error("해당 조건에 맞는 공시가격 연혁을 찾지 못했습니다.");
                }

            } catch (error) {
                alert(error.message);
            } finally {
                btn.innerText = "연도별 공시가격 조회하기";
                btn.disabled = false;
                btn.classList.remove('opacity-70');
            }
        }

        // 📈 차트 렌더링 함수 (스타일 다듬기)
        function renderChart(data) {
            const ctx = document.getElementById('priceChart').getContext('2d');
            
            if (priceChartInstance) {
                priceChartInstance.destroy();
            }

            const chartData = [...data].reverse();
            const labels = chartData.map(row => row.year);
            const prices = chartData.map(row => row.price);

            priceChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '기준시가',
                        data: prices,
                        borderColor: '#4f46e5',
                        backgroundColor: 'rgba(79, 70, 229, 0.1)',
                        borderWidth: 3,
                        pointBackgroundColor: '#ffffff',
                        pointBorderColor: '#4f46e5',
                        pointBorderWidth: 2,
                        pointHoverBackgroundColor: '#4f46e5',
                        pointRadius: 5,
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return context.parsed.y.toLocaleString() + ' 원';
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: false,
                            grid: { color: '#f1f5f9', drawBorder: false },
                            ticks: {
                                callback: function(value) {
                                    if (value >= 100000000) {
                                        return (value / 100000000).toFixed(1) + '억';
                                    }
                                    return value.toLocaleString();
                                },
                                font: { family: "sans-serif" }
                            }
                        },
                        x: {
                            grid: { display: false }
                        }
                    }
                }
            });
        }

        // 🌟 테이블 대신 둥근 알약(Pill) 태그 형태로 데이터를 렌더링하는 함수
        function renderTags(propType, data) {
            const container = document.getElementById('tag-container');
            container.innerHTML = ""; // 기존 내용 비우기

            data.forEach(row => {
                let extraInfo = "";
                // 면적 정보 등을 작게 옆에 표시
                if (propType === "공동주택") {
                    extraInfo = `<span class="text-xs text-slate-400 ml-2 font-normal">${row.area}㎡</span>`;
                } else if (propType === "단독주택") {
                    extraInfo = `<span class="text-xs text-slate-400 ml-2 font-normal">건물:${row.bldArea}㎡</span>`;
                }

                // Tailwind 클래스로 벤치마킹한 디자인 구현
                const tagHTML = `
                    <div class="inline-flex items-center bg-white border border-slate-200 rounded-full px-5 py-3 shadow-sm hover:shadow-md hover:border-indigo-400 hover:ring-2 hover:ring-indigo-100 transition-all cursor-default">
                        <span class="font-extrabold text-slate-800 tracking-tight mr-3 text-sm">${row.year}</span>
                        <span class="text-indigo-600 font-bold text-base md:text-lg">${row.price.toLocaleString()}<span class="text-sm font-medium ml-1 text-indigo-400">원</span></span>
                        ${extraInfo}
                    </div>
                `;
                
                container.innerHTML += tagHTML;
            });
        }
    </script>
</body>
</html>
