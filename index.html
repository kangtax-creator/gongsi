<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>양도세용 공시가격 연혁 조회 엔진</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto space-y-6">
        <header class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <h1 class="text-2xl font-bold tracking-tight text-slate-900">부동산 공시가격 연혁 통합 조회</h1>
            <p class="text-sm text-slate-500 mt-2">VWORLD API 기반 연도별 기준시가 및 면적 데이터 추출</p>
        </header>

        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 space-y-5">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">물건 종류</label>
                <div class="flex space-x-4">
                    <label class="flex items-center space-x-2 cursor-pointer">
                        <input type="radio" name="propType" value="공동주택" checked class="text-indigo-600 focus:ring-indigo-500">
                        <span class="text-sm font-medium">공동주택 (아파트/빌라)</span>
                    </label>
                    <label class="flex items-center space-x-2 cursor-pointer">
                        <input type="radio" name="propType" value="단독주택" class="text-indigo-600 focus:ring-indigo-500">
                        <span class="text-sm font-medium">단독/개별주택</span>
                    </label>
                    <label class="flex items-center space-x-2 cursor-pointer">
                        <input type="radio" name="propType" value="토지" class="text-indigo-600 focus:ring-indigo-500">
                        <span class="text-sm font-medium">개별공시지가 (토지)</span>
                    </label>
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">대상 주소</label>
                <div class="flex space-x-2">
                    <input type="text" id="address" readonly placeholder="주소 검색 버튼을 클릭하세요" class="flex-1 bg-slate-50 border border-slate-300 rounded-lg px-4 py-2 text-sm focus:outline-none">
                    <button onclick="execDaumPostcode()" class="bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors">주소 검색</button>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">동 (선택)</label>
                    <input type="text" id="dong" placeholder="예: 101" class="w-full border border-slate-300 rounded-lg px-4 py-2 text-sm focus:border-indigo-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">호 (선택)</label>
                    <input type="text" id="ho" placeholder="예: 502" class="w-full border border-slate-300 rounded-lg px-4 py-2 text-sm focus:border-indigo-500 focus:outline-none">
                </div>
            </div>

            <button onclick="searchPriceHistory()" id="searchBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg shadow-sm transition-all mt-4">
                연도별 공시가격 조회하기
            </button>
        </div>

        <div id="result-container" class="hidden bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="bg-slate-50 border-b border-slate-200 p-4">
                <h3 class="text-sm font-bold text-slate-800" id="result-msg">조회 결과</h3>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse min-w-full">
                    <thead>
                        <tr class="bg-white text-slate-500 text-xs uppercase tracking-wider border-b border-slate-200" id="table-head">
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-slate-100 text-sm">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // ✅ 여기에 VWORLD 개발자 센터에서 깃허브 전용으로 발급받은 API 키를 넣어주세요.
        const VWORLD_KEY = "75321A8E-275D-32A6-82AC-B9D0D8E551FE";
        const DOMAIN = window.location.origin; 

        // 카카오 주소 검색
        function execDaumPostcode() {
            new daum.Postcode({
                oncomplete: function(data) {
                    document.getElementById('address').value = data.roadAddress || data.jibunAddress;
                }
            }).open();
        }

        function extractNum(text) {
            if (!text) return "";
            const nums = String(text).match(/\d+/g);
            return nums ? nums.join("") : String(text).trim();
        }

        // 🌟 [핵심 우회 로직] CORS 차단을 뚫는 JSONP 통신 함수
        function fetchJSONP(url) {
            return new Promise((resolve, reject) => {
                const callbackName = 'vworld_cb_' + Math.round(100000 * Math.random());
                const script = document.createElement('script');
                
                window[callbackName] = function(data) {
                    delete window[callbackName];
                    document.body.removeChild(script);
                    resolve(data);
                };

                const char = url.indexOf('?') > -1 ? '&' : '?';
                // format을 jsonp로 강제 설정하여 브라우저 차단 우회
                script.src = url.replace('format=json', 'format=jsonp') + char + 'callback=' + callbackName;
                
                script.onerror = () => {
                    delete window[callbackName];
                    document.body.removeChild(script);
                    reject(new Error('VWORLD 서버 응답 지연 또는 CORS 우회 실패'));
                };

                document.body.appendChild(script);
            });
        }

        // 1. 주소로 PNU 코드 가져오기 (JSONP 적용)
        async function getPnu(address) {
            const categories = ["parcel", "road"]; 
            
            for (let category of categories) {
                // format=jsonp 로 변경
                const url = `https://api.vworld.kr/req/search?service=search&request=search&version=2.0&query=${encodeURIComponent(address)}&type=address&category=${category}&format=jsonp&key=${VWORLD_KEY}&domain=${DOMAIN}`;
                
                try {
                    const data = await fetchJSONP(url);
                    if (data.response && data.response.status === 'OK' && data.response.result.items.length > 0) {
                        return data.response.result.items[0].id; 
                    }
                } catch (error) {
                    console.error(`PNU 조회 실패 (${category}):`, error);
                }
            }
            return null;
        }

        // 2. 메인 조회 로직 (JSONP 적용)
        async function searchPriceHistory() {
            const address = document.getElementById('address').value;
            const propType = document.querySelector('input[name="propType"]:checked').value;
            const dong = extractNum(document.getElementById('dong').value);
            const ho = extractNum(document.getElementById('ho').value);
            const btn = document.getElementById('searchBtn');

            if (!address) {
                alert("대상 주소를 입력해주세요.");
                return;
            }

            btn.innerText = "데이터 수집 및 분석 중...";
            btn.disabled = true;
            btn.classList.add('opacity-70');
            document.getElementById('result-container').classList.add('hidden');

            try {
                const pnu = await getPnu(address);
                if (!pnu) {
                    throw new Error(`'${address}' 주소를 인식할 수 없습니다.`);
                }

                let apiUrl = "";
                let priceField = "";

                if (propType === "공동주택") {
                    apiUrl = "https://api.vworld.kr/ned/data/getApartHousingPriceAttr";
                    priceField = "pblntfPc";
                } else if (propType === "단독주택") {
                    apiUrl = "https://api.vworld.kr/ned/data/getIndvdHousingPriceAttr";
                    priceField = "pblntfPc";
                } else {
                    apiUrl = "https://api.vworld.kr/ned/data/getIndvdLandPriceAttr";
                    priceField = "pblntfPclnd";
                }

                const historyData = [];
                let pageNo = 1;
                let keepFetching = true;

                while (keepFetching) {
                    // format=jsonp 로 변경
                    const params = new URLSearchParams({
                        key: VWORLD_KEY, pnu: pnu, format: "jsonp",
                        numOfRows: "1000", pageNo: String(pageNo), domain: DOMAIN
                    });

                    // JSONP 함수로 국토부 데이터 호출
                    const data = await fetchJSONP(`${apiUrl}?${params.toString()}`);

                    let items = [];
                    for (const key in data) {
                        if (data[key] && data[key].field) {
                            items = Array.isArray(data[key].field) ? data[key].field : [data[key].field];
                            break;
                        }
                    }

                    if (items.length === 0) break;

                    for (const item of items) {
                        if (propType === "공동주택") {
                            const itemDong = extractNum(item.dongNm);
                            const itemHo = extractNum(item.hoNm);
                            if ((dong && itemDong !== dong) || (ho && itemHo !== ho)) continue;
                        }

                        const priceVal = item[priceField] || item.housePc || item.prc || 0;
                        const yearVal = item.stdrYear || item.pblntfYear;

                        if (priceVal && yearVal) {
                            const row = {
                                year: `${yearVal}년`,
                                price: parseInt(priceVal)
                            };

                            if (propType === "공동주택") {
                                row.area = item.prvuseAr || item.totArea || "N/A";
                            } else if (propType === "단독주택") {
                                row.landArea = item.ladRegstrAr || item.totPlotAr || item.plotAr || "N/A";
                                row.bldArea = item.buldAllTotAr || item.totFlrAr || "N/A";
                            }
                            historyData.push(row);
                        }
                    }

                    if (items.length < 1000) keepFetching = false;
                    pageNo++;
                }

                if (historyData.length > 0) {
                    historyData.sort((a, b) => parseInt(b.year) - parseInt(a.year));
                    renderTable(propType, historyData);
                    document.getElementById('result-msg').innerText = "✅ 양도세 계산용 기준시가 전체 내역 조회 완료!";
                } else {
                    throw new Error("해당 조건에 맞는 공시가격 연혁을 찾지 못했습니다.");
                }

            } catch (error) {
                alert(error.message);
            } finally {
                btn.innerText = "연도별 공시가격 조회하기";
                btn.disabled = false;
                btn.classList.remove('opacity-70');
            }
        }

        // 3. 테이블 렌더링 함수
        function renderTable(propType, data) {
            const thead = document.getElementById('table-head');
            const tbody = document.getElementById('table-body');
            
            thead.innerHTML = "";
            tbody.innerHTML = "";

            let thHTML = `<th class="px-6 py-4 font-semibold">고시연도</th><th class="px-6 py-4 font-semibold text-right">기준시가 (원)</th>`;
            if (propType === "공동주택") {
                thHTML += `<th class="px-6 py-4 font-semibold text-right">전용면적 (㎡)</th>`;
            } else if (propType === "단독주택") {
                thHTML += `<th class="px-6 py-4 font-semibold text-right">대지면적 (㎡)</th><th class="px-6 py-4 font-semibold text-right">건물면적 (㎡)</th>`;
            }
            thead.innerHTML = thHTML;

            data.forEach(row => {
                let trHTML = `
                    <td class="px-6 py-4 font-medium text-slate-900">${row.year}</td>
                    <td class="px-6 py-4 font-bold text-indigo-600 text-right text-base">${row.price.toLocaleString()} 원</td>
                `;
                if (propType === "공동주택") {
                    trHTML += `<td class="px-6 py-4 text-slate-500 text-right">${row.area}</td>`;
                } else if (propType === "단독주택") {
                    trHTML += `<td class="px-6 py-4 text-slate-500 text-right">${row.landArea}</td><td class="px-6 py-4 text-slate-500 text-right">${row.bldArea}</td>`;
                }
                
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 transition-colors";
                tr.innerHTML = trHTML;
                tbody.appendChild(tr);
            });

            document.getElementById('result-container').classList.remove('hidden');
        }
    </script>
</body>
</html>
