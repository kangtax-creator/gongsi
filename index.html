    <div class="max-w-4xl mx-auto px-4 -mt-12 pb-12 grid grid-cols-1 md:grid-cols-3 gap-6 items-start">
        
        <div class="md:col-span-2 space-y-6">

                <h2 class="text-lg font-extrabold text-slate-800 mb-4 flex items-center">
                    <span class="w-2 h-2 bg-indigo-600 rounded-full mr-2"></span> 개별 주소 검색 (단건)

                                <input type="radio" name="propType" value="공동주택" checked class="peer sr-only">

                            </label>
                            <label class="cursor-pointer">
                                <input type="radio" name="propType" value="단독주택" class="peer sr-only">

                    <div class="flex space-x-2">
                        <input type="text" id="address" readonly placeholder="주소 검색 버튼을 클릭하세요" class="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none">
                        <button onclick="execDaumPostcode()" class="bg-slate-800 hover:bg-slate-700 text-white px-4 py-2.5 rounded-xl text-sm font-medium transition-colors whitespace-nowrap">주소 검색</button>

                    <div class="grid grid-cols-2 gap-4">

                        <input type="text" id="ho" placeholder="호 (선택) ex: 502" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none">

                    <button onclick="searchPriceHistory()" id="searchBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl shadow-md transition-all">

            <div id="result-container" class="hidden space-y-6">

                        <canvas id="priceChart"></canvas>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-md border border-slate-200">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-lg font-extrabold text-slate-800">연도별 상세 데이터</h2>
                        <button onclick="downloadExcel()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-sm transition-colors flex items-center">

                    </div>
                    <div id="tag-container" class="flex flex-wrap gap-3"></div>

        </div>

        <div class="space-y-6">
            <div class="bg-white p-6 rounded-2xl shadow-md border border-slate-200">
                <h2 class="text-lg font-extrabold text-slate-800 mb-2 flex items-center">
                    <span class="w-2 h-2 bg-emerald-600 rounded-full mr-2"></span> 엑셀 대량 조회 (Batch)
                </h2>
                <p class="text-xs text-slate-400 mb-4 leading-relaxed">
                    A열에 주소를 붙여넣고 파일을 올려주세요. (예: 강남구 언주로 56, 2901 형식도 완벽 인식)
                </p>

                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">파일 물건 종류 지정</label>
                        <select id="bulkPropType" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-xs focus:outline-none text-slate-700 font-medium">
                            <option value="공동주택">공동주택 (아파트/빌라)</option>
                            <option value="단독주택">단독/개별주택</option>
                            <option value="토지">개별공시지가 (토지)</option>
                        </select>
                    </div>

                    <div class="border-2 border-dashed border-slate-200 hover:border-emerald-500 rounded-2xl p-6 text-center transition-all bg-slate-50/50 cursor-pointer relative group">
                        <input type="file" id="excelFileInput" accept=".xlsx, .xls" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" onchange="handleBulkExcel(event)">
                        <div class="space-y-2">
                            <div class="text-2xl text-slate-400 group-hover:text-emerald-500 transition-colors">📊</div>
                            <p class="text-xs font-bold text-slate-600 group-hover:text-emerald-600 transition-colors">엑셀 파일 선택 또는 드래그</p>
                            <p class="text-[10px] text-slate-400">.xlsx / .xls 파일만 가능</p>
                        </div>
                    </div>

                    <div id="bulk-progress-container" class="hidden space-y-2 bg-slate-50 p-4 rounded-xl border border-slate-100">
                        <div class="flex justify-between text-xs font-bold">
                            <span id="bulk-status-text" class="text-indigo-600">준비 중...</span>
                            <span id="bulk-percentage" class="text-slate-500">0%</span>
                        </div>
                        <div class="w-full bg-slate-200 rounded-full h-2">
                            <div id="bulk-progress-bar" class="bg-indigo-600 h-2 rounded-full transition-all duration-200" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const VWORLD_KEY = "75321A8E-275D-32A6-82AC-B9D0D8E551FE";
        const DOMAIN = window.location.origin; 
        
        let priceChartInstance = null;
        let currentExcelData = [];
        let currentPropType = "";

        const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

        function execDaumPostcode() {
            new daum.Postcode({
                oncomplete: function(data) {
                    document.getElementById('address').value = data.roadAddress || data.jibunAddress;
                }
            }).open();
        }

        function extractNum(text) {
            if (!text) return "";
            const nums = String(text).match(/\d+/g);
            return nums ? nums.join("") : String(text).trim();
        }

        function fetchJSONP(url) {
            return new Promise((resolve, reject) => {
                const callbackName = 'vworld_cb_' + Math.round(100000 * Math.random());
                const script = document.createElement('script');
                window[callbackName] = function(data) {
                    delete window[callbackName];
                    document.body.removeChild(script);
                    resolve(data);
                };
                const char = url.indexOf('?') > -1 ? '&' : '?';
                script.src = url + char + 'callback=' + callbackName;
                script.onerror = () => {
                    delete window[callbackName];
                    document.body.removeChild(script);
                    reject(new Error('서버 응답 지연'));
                };
                document.body.appendChild(script);
            });
        }

        async function getPnu(address) {
            const categories = ["parcel", "road"]; 
            for (let category of categories) {
                const url = `https://api.vworld.kr/req/search?service=search&request=search&version=2.0&query=${encodeURIComponent(address)}&type=address&category=${category}&format=json&key=${VWORLD_KEY}&domain=${DOMAIN}`;
                try {
                    const data = await fetchJSONP(url);
                    if (data.response && data.response.status === 'OK' && data.response.result.items.length > 0) {
                        return data.response.result.items[0].id; 
                    }
                } catch (error) {
                    console.error(`PNU 조회 실패:`, error);
                }
            }
            return null;
        }

        async function handleBulkExcel(event) {
            const file = event.target.files[0];
            if (!file) return;

            const propType = document.getElementById('bulkPropType').value;
            const progressContainer = document.getElementById('bulk-progress-container');
            const progressBar = document.getElementById('bulk-progress-bar');
            const statusText = document.getElementById('bulk-status-text');
            const percentageText = document.getElementById('bulk-percentage');

            progressContainer.classList.remove('hidden');
            statusText.innerText = "데이터 스마트 분석 중...";
            progressBar.style.width = "0%";
            percentageText.innerText = "0%";

            const reader = new FileReader();
            reader.onload = async function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                    const rows = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
                    
                    const validRows = [];

                    for (let i = 0; i < rows.length; i++) {
                        if (i === 0 && (rows[i][0] === "주소" || rows[i][0] === "대상 주소")) continue;
                        
                        let rawAddr = rows[i][0] ? String(rows[i][0]).trim() : "";
                        if (!rawAddr) continue;
                        
                        let dong = rows[i][1] ? String(rows[i][1]).replace(/\D/g, '') : "";
                        let ho = rows[i][2] ? String(rows[i][2]).replace(/\D/g, '') : "";
                        let baseAddr = rawAddr;

                        // 🌟 [핵심 수정] 동/호수 및 '단일 호수' 정밀 필터링 정규식
                        if (!dong && !ho) {
                            // 1. "101-202", "101동 202호" 형태 매칭
                            let matchDongHo = rawAddr.match(/(\d+)\s*(?:동|-)\s*(\d+)\s*(?:호)?\s*$/);
                            // 2. ", 2901", ", 2901호" 형태 (쉼표 뒤에 달랑 호수만 있는 경우)
                            let matchHoComma = rawAddr.match(/,\s*(?:제)?(\d+)\s*(?:호)?\s*$/);
                            // 3. " 2901호" 형태 (띄어쓰기 후 호수만 있는 경우)
                            let matchHoText = rawAddr.match(/\s+(?:제)?(\d+)\s*호\s*$/);

                            if (matchDongHo) {
                                dong = matchDongHo[1];
                                ho = matchDongHo[2];
                                baseAddr = rawAddr.replace(matchDongHo[0], '').replace(/,\s*$/, '').trim();
                            } else if (matchHoComma) {
                                ho = matchHoComma[1];
                                baseAddr = rawAddr.replace(matchHoComma[0], '').trim();
                            } else if (matchHoText) {
                                ho = matchHoText[1];
                                baseAddr = rawAddr.replace(matchHoText[0], '').replace(/,\s*$/, '').trim();
                            }
                        }
                        validRows.push({ rawAddr, baseAddr, dong, ho });
                    }

                    if (validRows.length === 0) {
                        alert("엑셀 파일에서 유효한 주소를 찾지 못했습니다.");
                        progressContainer.classList.add('hidden');
                        return;
                    }

                    const totalCount = validRows.length;
                    const finalBulkRows = [];

                    for (let i = 0; i < totalCount; i++) {
                        const { rawAddr, baseAddr, dong, ho } = validRows[i];
                        
                        const percent = Math.round(((i + 1) / totalCount) * 100);
                        statusText.innerText = `데이터 수집 중... (${i + 1}/${totalCount})`;
                        progressBar.style.width = `${percent}%`;
                        percentageText.innerText = `${percent}%`;

                        const pnu = await getPnu(baseAddr);
                        if (!pnu) {
                            finalBulkRows.push({ "대상 주소": rawAddr, "고시연도": "오류", "기준시가(원)": "주소 인식 불가" });
                            continue;
                        }

                        let apiUrl = "";
                        let priceField = "";
                        if (propType === "공동주택") { apiUrl = "https://api.vworld.kr/ned/data/getApartHousingPriceAttr"; priceField = "pblntfPc"; }
                        else if (propType === "단독주택") { apiUrl = "https://api.vworld.kr/ned/data/getIndvdHousingPriceAttr"; priceField = "pblntfPc"; }
                        else { apiUrl = "https://api.vworld.kr/ned/data/getIndvdLandPriceAttr"; priceField = "pblntfPclnd"; }

                        try {
                            let pageNo = 1;
                            let keepFetching = true;
                            const seenYears = new Set();
                            const tempHistory = [];

                            while (keepFetching) {
                                const params = new URLSearchParams({ key: VWORLD_KEY, pnu: pnu, format: "json", numOfRows: "1000", pageNo: String(pageNo), domain: DOMAIN });
                                const resData = await fetchJSONP(`${apiUrl}?${params.toString()}`);

                                let items = [];
                                for (const key in resData) {
                                    if (resData[key] && resData[key].field) {
                                        items = Array.isArray(resData[key].field) ? resData[key].field : [resData[key].field];
                                        break;
                                    }
                                }

                                if (items.length === 0) break;

                                for (const item of items) {
                                    if (propType === "공동주택") {
                                        const itemDong = extractNum(item.dongNm);
                                        const itemHo = extractNum(item.hoNm);
                                        // 🌟 수정된 필터링: 동이 없으면 호수만 검사해서 철저히 일치하는 세대만 추출
                                        if (dong && itemDong !== dong) continue;
                                        if (ho && itemHo !== ho) continue;
                                    }

                                    const priceVal = item[priceField] || item.housePc || item.prc || 0;
                                    const yearVal = item.stdrYear || item.pblntfYear;

                                    if (priceVal && yearVal) {
                                        const uniqueKey = `${yearVal}_${priceVal}`;
                                        if (!seenYears.has(uniqueKey)) {
                                            seenYears.add(uniqueKey);
                                            
                                            let rowObj = {
                                                "대상 주소": rawAddr,
                                                "고시연도": `${yearVal}년`,
                                                "기준시가(원)": parseInt(priceVal)
                                            };
                                            if (propType === "공동주택") { rowObj["전용면적(㎡)"] = item.prvuseAr || "N/A"; }
                                            else if (propType === "단독주택") { rowObj["대지면적(㎡)"] = item.ladRegstrAr || "N/A"; rowObj["건물면적(㎡)"] = item.buldAllTotAr || "N/A"; }
                                            
                                            tempHistory.push(rowObj);
                                        }
                                    }
                                }

                                if (items.length < 1000) keepFetching = false;
                                pageNo++;
                            }

                            if (tempHistory.length === 0) {
                                finalBulkRows.push({ "대상 주소": rawAddr, "고시연도": "정보 없음", "기준시가(원)": "공시가격 데이터 누락" });
                            } else {
                                tempHistory.sort((a, b) => parseInt(b["고시연도"]) - parseInt(a["고시연도"]));
                                finalBulkRows.push(...tempHistory);
                            }
                        } catch (err) {
                            finalBulkRows.push({ "대상 주소": rawAddr, "고시연도": "에러", "기준시가(원)": "서버 통신 실패" });
                        }

                        await sleep(200); 
                    }

                    statusText.innerText = "엑셀 빌드 및 파일 생성 중...";
                    finalBulkRows.push({});
                    finalBulkRows.push({
                        "대상 주소": "💡 양도세/상속세/증여세 및 부동산 절세 상담:",
                        "고시연도": "강승완 세무사",
                        "기준시가(원)": "www.micro-tax.com"
                    });

                    const bulkWorksheet = XLSX.utils.json_to_sheet(finalBulkRows);
                    bulkWorksheet['!cols'] = [{ wch: 45 }, { wch: 12 }, { wch: 18 }, { wch: 15 }, { wch: 15 }];
                    
                    const bulkWorkbook = XLSX.utils.book_new();
                    XLSX.utils.book_append_sheet(bulkWorkbook, bulkWorksheet, "대량_조회_결과");
                    
                    XLSX.writeFile(bulkWorkbook, "강승완세무사_대량_공시가격_추출결과.xlsx");
                    
                    statusText.innerText = "✅ 대량 취합 다운로드 완료!";
                    event.target.value = ""; 

                } catch (err) {
                    alert("엑셀 파일 파싱 중 문제가 발생했습니다.");
                    progressContainer.classList.add('hidden');
                }
            };
            reader.readAsArrayBuffer(file);
        }

        async function searchPriceHistory() {
            const address = document.getElementById('address').value;
            const propType = document.querySelector('input[name="propType"]:checked').value;
            const dong = extractNum(document.getElementById('dong').value);
            const ho = extractNum(document.getElementById('ho').value);
            const btn = document.getElementById('searchBtn');

            if (!address) {
                alert("대상 주소를 입력해주세요.");
                return;
            }

            btn.innerText = "데이터 분석 중...";
            btn.disabled = true;
            btn.classList.add('opacity-70');
            document.getElementById('result-container').classList.add('hidden');

            try {
                const pnu = await getPnu(address);
                if (!pnu) {
                    throw new Error(`'${address}' 주소를 인식할 수 없습니다.`);
                }

                let apiUrl = "";
                let priceField = "";

                if (propType === "공동주택") { apiUrl = "https://api.vworld.kr/ned/data/getApartHousingPriceAttr"; priceField = "pblntfPc"; }
                else if (propType === "단독주택") { apiUrl = "https://api.vworld.kr/ned/data/getIndvdHousingPriceAttr"; priceField = "pblntfPc"; }
                else { apiUrl = "https://api.vworld.kr/ned/data/getIndvdLandPriceAttr"; priceField = "pblntfPclnd"; }

                const historyData = [];
                let pageNo = 1;
                let keepFetching = true;

                while (keepFetching) {
                    const params = new URLSearchParams({ key: VWORLD_KEY, pnu: pnu, format: "json", numOfRows: "1000", pageNo: String(pageNo), domain: DOMAIN });
                    const data = await fetchJSONP(`${apiUrl}?${params.toString()}`);

                    let items = [];
                    for (const key in data) {
                        if (data[key] && data[key].field) {
                            items = Array.isArray(data[key].field) ? data[key].field : [data[key].field];
                            break;
                        }
                    }

                    if (items.length === 0) break;

                    for (const item of items) {
                        if (propType === "공동주택") {
                            const itemDong = extractNum(item.dongNm);
                            const itemHo = extractNum(item.hoNm);
                            if (dong && itemDong !== dong) continue;
                            if (ho && itemHo !== ho) continue;
                        }

                        const priceVal = item[priceField] || item.housePc || item.prc || 0;
                        const yearVal = item.stdrYear || item.pblntfYear;

                        if (priceVal && yearVal) {
                            const row = { year: `${yearVal}년`, price: parseInt(priceVal) };
                            if (propType === "공동주택") { row.area = item.prvuseAr || "N/A"; }
                            else if (propType === "단독주택") { row.landArea = item.ladRegstrAr || "N/A"; row.bldArea = item.buldAllTotAr || "N/A"; }
                            historyData.push(row);
                        }
                    }
                    if (items.length < 1000) keepFetching = false;
                    pageNo++;
                }

                if (historyData.length > 0) {
                    const uniqueData = [];
                    const seen = new Set();
                    historyData.forEach(row => {
                        const key = `${row.year}_${row.price}`;
                        if (!seen.has(key)) { seen.add(key); uniqueData.push(row); }
                    });

                    uniqueData.sort((a, b) => parseInt(b.year) - parseInt(a.year));
                    
                    currentExcelData = uniqueData;
                    currentPropType = propType;

                    renderChart(uniqueData);
                    renderTags(propType, uniqueData);
                    document.getElementById('result-container').classList.remove('hidden');
                } else {
                    throw new Error("해당 조건에 맞는 공시가격 연혁을 찾지 못했습니다.");
                }
            } catch (error) {
                alert(error.message);
            } finally {
                btn.innerText = "조회하기";
                btn.disabled = false;
                btn.classList.remove('opacity-70');
            }
        }

        function downloadExcel() {
            if (currentExcelData.length === 0) return;

            const addressInput = document.getElementById('address').value;
            const dongInput = document.getElementById('dong').value;
            const hoInput = document.getElementById('ho').value;

            let fullAddress = addressInput;
            if (dongInput) fullAddress += ` ${dongInput}동`;
            if (hoInput) fullAddress += ` ${hoInput}호`;

            const formattedData = currentExcelData.map(row => {
                let excelRow = { "대상 주소": fullAddress, "고시연도": row.year, "기준시가(원)": row.price };
                if (currentPropType === "공동주택") { excelRow["전용면적(㎡)"] = row.area; }
                else if (currentPropType === "단독주택") { excelRow["대지면적(㎡)"] = row.landArea; excelRow["건물면적(㎡)"] = row.bldArea; }
                return excelRow;
            });

            formattedData.push({}); 
            formattedData.push({ "대상 주소": "💡 양도세/상속세/증여세 및 부동산 절세 상담:", "고시연도": "강승완 세무사", "기준시가(원)": "www.micro-tax.com" });

            const worksheet = XLSX.utils.json_to_sheet(formattedData);
            worksheet['!cols'] = [{ wch: 45 }, { wch: 12 }, { wch: 18 }, { wch: 15 }, { wch: 15 }];
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "공시가격_연혁");
            XLSX.writeFile(workbook, "강승완세무사_양도세_기준시가.xlsx");
        }

        function renderChart(data) {
            const ctx = document.getElementById('priceChart').getContext('2d');
            if (priceChartInstance) { priceChartInstance.destroy(); }
            const chartData = [...data].reverse();
            priceChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: chartData.map(row => row.year),
                    datasets: [{
                        label: '기준시가', data: chartData.map(row => row.price),
                        borderColor: '#4f46e5', backgroundColor: 'rgba(79, 70, 229, 0.1)',
                        borderWidth: 3, pointBackgroundColor: '#ffffff', pointBorderColor: '#4f46e5',
                        pointBorderWidth: 2, pointHoverBackgroundColor: '#4f46e5', pointRadius: 5, fill: true, tension: 0.4
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: {
                            ticks: {
                                callback: function(value) { return value >= 100000000 ? (value / 100000000).toFixed(1) + '억' : value.toLocaleString(); }
                            }
                        }
                    }
                }
            });
        }

        function renderTags(propType, data) {
            const container = document.getElementById('tag-container');
            container.innerHTML = "";
            data.forEach(row => {
                let extraInfo = propType === "공동주택" ? `${row.area}㎡` : (propType === "단독주택" ? `건물:${row.bldArea}㎡` : "");
                container.innerHTML += `
                    <div class="inline-flex items-center bg-white border border-slate-200 rounded-full px-5 py-3 shadow-sm cursor-default">
                        <span class="font-extrabold text-slate-800 tracking-tight mr-3 text-sm">${row.year}</span>
                        <span class="text-indigo-600 font-bold text-base">${row.price.toLocaleString()}<span class="text-sm font-medium ml-1 text-indigo-400">원</span></span>
                        <span class="text-xs text-slate-400 ml-2 font-normal">${extraInfo}</span>
                    </div>`;
            });
        }
    </script>
</body>
</html>
